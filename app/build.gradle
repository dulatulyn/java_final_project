plugins {
    id 'application'
    id 'java'
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

application {
    mainClass = 'com.kbtu.university.cli.CLI'
}

repositories {
    mavenCentral()
}

tasks.named('run') {
    standardInput = System.in
}
